display_information:
  name: Joshua QA
  description: Autonomous QA gate verdicts in your Slack
  background_color: "#1a1a2e"

features:
  slash_commands:
    - command: /joshua
      description: Check sprint status or trigger a run
      usage_hint: "[status|run|approve] [sprint-id]"
      should_escape: false
  bot_user:
    display_name: Joshua
    always_online: true

oauth_config:
  scopes:
    bot:
      - commands
      - incoming-webhook
      - chat:write
      - chat:write.public

settings:
  interactivity:
    is_enabled: true
    request_url: https://your-host/slack/events
  event_subscriptions:
    request_url: https://your-host/slack/events
    bot_events:
      - app_mention
  org_deploy_enabled: false
  socket_mode_enabled: false
