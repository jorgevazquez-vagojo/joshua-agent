# Primor — Magento 2 QA + Bug Hunting sprint
# Cubre el sitio web (primor.eu) y el codebase Magento.
#
# Uso:
#   PRIMOR_PATH=~/primor-magento TELEGRAM_TOKEN=xxx TELEGRAM_CHAT_ID=yyy \
#   joshua run examples/primor-magento.yaml
#
# El sprint NO despliega nada. El gate clasifica hallazgos por severidad.
# Los reportes se acumulan en {PRIMOR_PATH}/reports/.

project:
  name: primor-magento
  path: ${PRIMOR_PATH:~/primor-magento}
  site_url: https://primor.eu

runner:
  type: claude
  timeout: 2400  # 40 min — las auditorías de código son lentas
  allowed_tools:
    - Bash
    - Read
    - Write
    - Glob
    - Grep

agents:
  # ── Investigador del sitio en vivo ─────────────────────────────
  researcher:
    skill: researcher
    name: probe
    tasks:
      - "Audita el funnel de checkout: homepage → búsqueda → PDP → carrito → checkout → confirmación. Mide tiempos. Documenta cualquier error HTTP, redirección rota o paso que no responda."
      - "Escanea páginas de categoría y búsqueda: prueba 10 URLs de categoría top, busca 5 términos populares (maquillaje, perfume, crema, labial, sérum). Mide velocidad. Detecta 0 resultados incorrectos."
      - "Audita la home y páginas de aterrizaje: verifica banners, links de menú, popups (newsletter, cookies), footer legal (aviso legal, privacidad, cookies GDPR). Prueba mobile user-agent."
      - "Prueba login, registro y recuperación de contraseña. Verifica zona personal: pedidos, wishlist, direcciones. Detecta errores de formulario o redirecciones incorrectas."
      - "Escanea para assets rotos: imágenes 404 en PDPs top, CSS/JS que no carga, fuentes. Comprueba que el sitio funciona sin JS (SSR/Magento blocks). Verifica SSL y HSTS."

  # ── Cazador de bugs Magento ─────────────────────────────────────
  magento-hunter:
    skill: magento-hunter
    name: vulcan-m2
    run_when_blocked: true
    tasks:
      - "Audita módulos custom en app/code/: revisa cada módulo en busca de uso directo de ObjectManager, missing di.xml, plugins con lógica pesada en beforeDispatch."
      - "Escanea queries N+1: busca collection->load() dentro de bucles foreach, getItems() sin filtros en Data Providers y ListBlocks. Propón fix con eager loading."
      - "Audita templates .phtml: busca variables sin escapar ($block->getData sin escapeHtml), uso de $_GET/$_POST directos, eval() o código obsoleto."
      - "Revisa cron jobs (crontab.xml): detecta jobs sin timeout, que bloqueen tablas, sin cleanup, o con scheduling solapado. Verifica que indexers no corran en horario pico."
      - "Audita el checkout custom: plugins en Quote, CartItem, ShippingInformation. Busca excepciones silenciadas, validaciones ausentes, incompatibilidades con módulos de pago."

  # ── Gate: clasificador de hallazgos e-commerce ──────────────────
  qa:
    skill: ecommerce-qa
    name: sentinel
    # phase: gate (auto-detected)
    # verdict_format: true (auto-detected)

sprint:
  cycle_sleep: 900          # 15 min entre ciclos
  max_cycles: 20            # ~5 horas de sprint continuo
  max_consecutive_errors: 3
  gate_blocking: true       # Si sentinel dice REVERT, agents de trabajo se bloquean
  cross_agent_context: true # vulcan-m2 recibe hallazgos de probe del ciclo anterior
  git_strategy: none        # No tocar git — solo lectura + reportes

memory:
  enabled: true
  lessons_per_cycle: 5      # Más lecciones para acumular patrones de bugs

notifications:
  type: telegram
  token: ${TELEGRAM_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}

safety:
  allowed_commands:
    - curl
    - python
    - python3
    - grep
    - find
    - cat
    - ls
    - mkdir
    - jq
  allowed_paths:
    - ${PRIMOR_PATH:~/primor-magento}
