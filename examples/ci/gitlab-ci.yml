# joshua-agent — GitLab CI template
# Copy to your project's .gitlab-ci.yml (or include it) and customize.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   ANTHROPIC_API_KEY         — your Anthropic API key
#   JOSHUA_INTERNAL_TOKEN     — at least 16 chars (if using joshua serve)
#
# Optional:
#   TELEGRAM_TOKEN / TELEGRAM_CHAT_ID — for notifications

stages:
  - sprint
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  JOSHUA_NO_COLOR: "1"

cache:
  paths:
    - .cache/pip/

sprint:
  stage: sprint
  image: python:3.12-slim
  timeout: 2 hours

  before_script:
    - pip install --quiet "joshua-agent[all]"
    # Install your runner — example: Claude Code
    # - apt-get update -qq && apt-get install -qq nodejs npm
    # - npm install -g @anthropic-ai/claude-code
    - joshua doctor joshua.yaml || true   # pre-flight (non-blocking)

  script:
    - |
      joshua run joshua.yaml \
        --max-cycles 10 \
        --max-hours 1.5

  after_script:
    - joshua export .joshua --format markdown --output sprint-report.md || true
    - joshua status .joshua --json > sprint-status.json || true

  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - sprint-report.md
      - sprint-status.json
      - .joshua/results.tsv
      - .joshua/logs/sprint.log

  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'   # Manual trigger
    - when: never

sprint-report:
  stage: report
  image: python:3.12-slim
  needs: [sprint]
  when: always

  script:
    - pip install --quiet "joshua-agent"
    - cat sprint-report.md

  artifacts:
    reports:
      # Expose report in GitLab MR widget (requires GitLab 15+)
      # Convert to JUnit if needed: add a converter step
      dotenv: sprint-status.json
