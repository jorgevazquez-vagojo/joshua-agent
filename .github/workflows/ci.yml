name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e '.[server,dev]'

      - name: Lint (syntax + undefined names)
        run: ruff check joshua/ tests/ --select=E9,F63,F7,F82

      - name: Run tests
        run: pytest tests/ -q

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install project + security tools
        run: pip install -e '.[server]' bandit pip-audit

      - name: Dependency audit (CVEs)
        run: pip-audit

      - name: Static security analysis (bandit)
        # -ll = medium+high severity only; skip test files
        run: bandit -r joshua/ -ll --skip B101 --quiet
